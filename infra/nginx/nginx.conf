upstream aura_frontend {
    server frontend:3000;
}
upstream aura_gateway {
    server gateway:8081;
}

# HTTP -> redirect to HTTPS in production. For bare-EC2 demos you can leave :80 serving directly.
server {
    listen 80 default_server;
    server_name _;

    # Certbot ACME challenge path (used by infra/ec2/deploy.sh when provisioning TLS)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # WebSocket upgrade for /ws/*
    location /ws/ {
        proxy_pass http://aura_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API pass-through
    location /api/ {
        proxy_pass http://aura_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://aura_gateway;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://aura_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
